<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사업자 일괄조회</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --bg2: #171923; --bg3: #1e2130;
    --border: #2a2f45; --border2: #363d58;
    --accent: #4f8ef7; --accent2: #7eb8ff;
    --text: #e8ecf5; --text2: #9aa3bf; --text3: #5c6480;
    --green: #3dd68c; --green-bg: #0d2b1f;
    --red: #f56565;   --red-bg: #2b0d0d;
    --yellow: #f6c90e; --yellow-bg: #2b250d;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

  /* HEADER */
  header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; gap: 12px; background: var(--bg2); }
  .logo-mark { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 14px; font-weight: 600; color: #fff; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 700; color: var(--text); }
  header span { font-size: 12px; color: var(--text3); margin-left: 8px; }

  /* MAIN */
  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

  /* SECTION LABEL */
  .section-label { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }

  /* INPUT */
  .input-area-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 16px; }
  .input-toolbar { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 8px; background: var(--bg3); flex-wrap: wrap; }
  .input-toolbar .hint { font-size: 12px; color: var(--text3); flex: 1; }
  textarea { width: 100%; min-height: 200px; background: var(--bg2); border: none; padding: 16px; font-family: var(--mono); font-size: 13px; color: var(--text); resize: vertical; outline: none; line-height: 1.8; }
  textarea::placeholder { color: var(--text3); }

  /* BUTTONS */
  .btn { border: none; border-radius: var(--radius); padding: 8px 16px; cursor: pointer; font-family: var(--sans); font-size: 13px; font-weight: 500; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6aa3ff; }
  .btn-primary:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-success { background: #1a4d34; border: 1px solid #2d7a54; color: var(--green); }
  .btn-success:hover { background: #1f5c3e; }

  .action-row { display: flex; gap: 10px; align-items: center; margin-bottom: 28px; flex-wrap: wrap; }
  .count-badge { font-family: var(--mono); font-size: 12px; color: var(--text3); background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 20px; display: none; }
  .progress-wrap.active { display: block; }
  .progress-bar-bg { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 8px; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .3s ease; width: 0%; }
  .progress-text { font-size: 12px; color: var(--text3); font-family: var(--mono); }

  /* RESULTS */
  .result-section { display: none; }
  .result-section.active { display: block; }
  .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
  .result-stats { display: flex; gap: 16px; flex-wrap: wrap; }
  .stat-chip { display: flex; align-items: center; gap: 6px; font-size: 12px; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; }

  .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { position: sticky; top: 0; z-index: 1; }
  th { background: var(--bg3); padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(79,142,247,0.04); }

  .mono { font-family: var(--mono); font-size: 13px; }
  .seq { color: var(--text3); font-family: var(--mono); font-size: 11px; }

  .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 4px; white-space: nowrap; }
  .badge-green  { background: var(--green-bg);  color: var(--green);  border: 1px solid #1a5e3a; }
  .badge-red    { background: var(--red-bg);    color: var(--red);    border: 1px solid #5e1a1a; }
  .badge-yellow { background: var(--yellow-bg); color: var(--yellow); border: 1px solid #5e4a0d; }
  .badge-gray   { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }

  .row-error td { background: rgba(245,101,101,0.04); }
  .row-pending td { opacity: 0.5; }

  /* FILTER TABS */
  .filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all .15s; }
  .tab:hover { border-color: var(--border2); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* TOAST */
  #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 20px; font-size: 13px; color: var(--text); transition: transform .25s ease; pointer-events: none; z-index: 999; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .empty-row td { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }

  @media (max-width: 600px) {
    main { padding: 20px 16px 60px; }
    header { padding: 16px; }
    th:nth-child(5), td:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">BZ</div>
  <div>
    <h1>사업자 일괄조회<span>국세청 Open API 연동</span></h1>
  </div>
</header>

<main>
  <div class="section-label">사업자등록번호 입력</div>
  <div class="input-area-wrap">
    <div class="input-toolbar">
      <span class="hint">한 줄에 하나씩, 또는 쉼표·탭으로 구분. 엑셀 복붙 가능. 하이픈(-) 자동 제거.</span>
      <button class="btn btn-ghost" style="font-size:12px;" onclick="loadSample()">샘플</button>
      <button class="btn btn-ghost" style="font-size:12px;" onclick="clearInput()">초기화</button>
    </div>
    <textarea id="inputArea" placeholder="예시)&#10;1234567890&#10;123-45-67890&#10;9876543210"></textarea>
  </div>

  <div class="action-row">
    <button class="btn btn-primary" id="runBtn" onclick="runLookup()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      조회 시작
    </button>
    <button class="btn btn-ghost" id="stopBtn" onclick="stopLookup()" style="display:none;">중단</button>
    <span class="count-badge" id="countBadge">0건 입력</span>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">대기 중...</div>
  </div>

  <div class="result-section" id="resultSection">
    <div class="result-header">
      <div class="result-stats" id="statsRow"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <div class="filter-tabs" id="filterTabs">
          <button class="tab active" onclick="setFilter('all',this)">전체</button>
          <button class="tab" onclick="setFilter('active',this)">계속사업자</button>
          <button class="tab" onclick="setFilter('closed',this)">폐업·휴업</button>
          <button class="tab" onclick="setFilter('error',this)">오류·미등록</button>
        </div>
        <button class="btn btn-success" onclick="downloadCSV()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV 다운로드
        </button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>사업자등록번호</th>
            <th>조회 결과</th>
            <th>과세 유형</th>
            <th>사업자 상태</th>
            <th>폐업일</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
let allResults = [];
let currentFilter = 'all';
let shouldStop = false;

function parseNumbers(raw) {
  return raw.split(/[\n,\t]+/).map(s => s.replace(/[^0-9]/g,'').trim()).filter(s => s.length > 0);
}

function validateBizNo(no) {
  if (no.length !== 10) return false;
  const w = [1,3,7,1,3,7,1,3,5];
  let sum = 0;
  for (let i = 0; i < 9; i++) sum += parseInt(no[i]) * w[i];
  sum += Math.floor((parseInt(no[8]) * 5) / 10);
  return (10 - (sum % 10)) % 10 === parseInt(no[9]);
}

function formatBizNo(no) { return `${no.slice(0,3)}-${no.slice(3,5)}-${no.slice(5)}`; }
function chunk(arr, size) { const c=[]; for(let i=0;i<arr.length;i+=size) c.push(arr.slice(i,i+size)); return c; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('inputArea').addEventListener('input', updateCount);
function updateCount() {
  const n = parseNumbers(document.getElementById('inputArea').value);
  document.getElementById('countBadge').textContent = `${n.length}건 입력`;
}
function loadSample() { document.getElementById('inputArea').value='1234567890\n2208808965\n1068617609\n2148788166\n1138600998'; updateCount(); }
function clearInput() { document.getElementById('inputArea').value=''; updateCount(); }

function getBadge(type, val, cd) {
  if (type === 'result') {
    if (val === 'fmt')  return '<span class="badge badge-red">형식 오류</span>';
    if (val === 'api')  return '<span class="badge badge-yellow">API 오류</span>';
    if (!val)           return '<span class="badge badge-gray">미등록</span>';
    return '<span class="badge badge-green">조회 성공</span>';
  }
  if (type === 'tax') {
    if (!val) return '<span class="badge badge-gray">-</span>';
    const s = val.replace('부가가치세 ','').replace('과세자','').trim();
    if (cd==='01') return `<span class="badge badge-green">${s}</span>`;
    if (cd==='02') return `<span class="badge badge-yellow">${s}</span>`;
    return `<span class="badge badge-gray">${s}</span>`;
  }
  if (type === 'status') {
    if (!val) return '<span class="badge badge-gray">-</span>';
    if (cd==='01') return `<span class="badge badge-green">● 계속사업자</span>`;
    if (cd==='02') return `<span class="badge badge-yellow">◐ 휴업</span>`;
    if (cd==='03') return `<span class="badge badge-red">✕ 폐업</span>`;
    return `<span class="badge badge-gray">${val}</span>`;
  }
}

function renderTable() {
  const body = document.getElementById('resultBody');
  let f = allResults;
  if (currentFilter==='active') f = allResults.filter(r => r.b_stt_cd==='01');
  if (currentFilter==='closed') f = allResults.filter(r => r.b_stt_cd==='02'||r.b_stt_cd==='03');
  if (currentFilter==='error')  f = allResults.filter(r => r.formatError||r.apiError||(!r.b_stt&&!r.formatError&&!r.apiError));
  if (!f.length) { body.innerHTML='<tr class="empty-row"><td colspan="6">해당 결과 없음</td></tr>'; return; }

  body.innerHTML = f.map((r,i) => {
    const cls = r.formatError||r.apiError ? 'row-error' : (r.pending ? 'row-pending' : '');
    const resKey = r.formatError ? 'fmt' : r.apiError ? 'api' : r.b_stt;
    const dt = r.end_dt ? r.end_dt.replace(/(\d{4})(\d{2})(\d{2})/,'$1.$2.$3') : '-';
    return `<tr class="${cls}">
      <td class="seq">${i+1}</td>
      <td class="mono">${formatBizNo(r.b_no)}</td>
      <td>${getBadge('result', resKey)}</td>
      <td>${getBadge('tax', r.tax_type, r.tax_type_cd)}</td>
      <td>${getBadge('status', r.b_stt, r.b_stt_cd)}</td>
      <td class="mono" style="color:var(--text3);font-size:12px;">${dt}</td>
    </tr>`;
  }).join('');
}

function renderStats() {
  const total  = allResults.length;
  const active = allResults.filter(r=>r.b_stt_cd==='01').length;
  const closed = allResults.filter(r=>r.b_stt_cd==='02'||r.b_stt_cd==='03').length;
  const errors = allResults.filter(r=>r.formatError||r.apiError||(!r.b_stt&&!r.formatError&&!r.apiError)).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-chip"><div class="stat-dot" style="background:var(--text3)"></div>전체 ${total}건</div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--green)"></div>계속사업자 ${active}건</div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--red)"></div>폐업·휴업 ${closed}건</div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--yellow)"></div>오류·미등록 ${errors}건</div>`;
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

async function callProxy(bizNos) {
  const res = await fetch('/api/lookup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ b_no: bizNos })
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  const json = await res.json();
  return json.data || [];
}

async function runLookup() {
  const raw = document.getElementById('inputArea').value;
  const nums = parseNumbers(raw);
  if (!nums.length) { showToast('❗ 조회할 사업자번호를 입력해주세요.'); return; }

  shouldStop = false;
  document.getElementById('runBtn').disabled = true;
  document.getElementById('stopBtn').style.display = 'inline-flex';
  document.getElementById('progressWrap').classList.add('active');
  document.getElementById('resultSection').classList.add('active');

  allResults = nums.map(no => ({
    b_no: no, formatError: !validateBizNo(no),
    b_stt: null, b_stt_cd: null, tax_type: null, tax_type_cd: null, end_dt: null,
    apiError: false, pending: true
  }));
  renderTable(); renderStats();

  const valid  = allResults.filter(r => !r.formatError);
  const chunks = chunk(valid, 100);
  let done = 0;

  for (const ch of chunks) {
    if (shouldStop) break;
    try {
      const data = await callProxy(ch.map(r => r.b_no));
      data.forEach(d => {
        const row = allResults.find(r => r.b_no === d.b_no);
        if (row) {
          row.b_stt      = d.b_stt      || null;
          row.b_stt_cd   = d.b_stt_cd   || null;
          row.tax_type    = d.tax_type    || null;
          row.tax_type_cd = d.tax_type_cd || null;
          row.end_dt      = d.end_dt      || null;
          row.pending     = false;
        }
      });
      ch.forEach(r => { r.pending = false; });
    } catch(e) {
      ch.forEach(r => { r.apiError = true; r.pending = false; });
      showToast(`오류: ${e.message}`);
    }
    done += ch.length;
    const pct = Math.round((done / valid.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${done} / ${valid.length}건 처리 중... (${pct}%)`;
    renderTable(); renderStats();
    await new Promise(r => setTimeout(r, 200));
  }

  document.getElementById('runBtn').disabled = false;
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('progressText').textContent = shouldStop ? '중단되었습니다.' : `완료: 총 ${nums.length}건`;
  document.getElementById('progressFill').style.width = '100%';
  renderTable(); renderStats();
  showToast(shouldStop ? '조회 중단' : `✓ 완료 (${nums.length}건)`);
}

function stopLookup() { shouldStop = true; document.getElementById('stopBtn').style.display = 'none'; }

function downloadCSV() {
  const headers = ['순번','사업자등록번호','형식오류','사업자상태','상태코드','과세유형','과세유형코드','폐업일'];
  const rows = allResults.map((r,i) => [
    i+1, formatBizNo(r.b_no),
    r.formatError ? '형식오류' : '',
    r.b_stt || (r.apiError ? 'API오류' : '미등록'),
    r.b_stt_cd || '', r.tax_type || '', r.tax_type_cd || '',
    r.end_dt ? r.end_dt.replace(/(\d{4})(\d{2})(\d{2})/,'$1.$2.$3') : ''
  ]);
  const bom = '\uFEFF';
  const csv = bom + [headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `사업자조회_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('✓ CSV 다운로드 완료');
}

updateCount();
</script>
</body>
</html>
